<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تواصل معنا - أفق المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f172a;
            margin: 0;
            padding: 0;
        }

        header {
            background: #0f172a;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-img {
            width: 90px;
        }

        .contact-container {
            background: white;
            max-width: 850px;
            margin: 60px auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        h1 {
            text-align: center;
            color: #2563eb;
            margin-bottom: 25px;
            font-size: 2rem;
        }

        label {
            font-weight: bold;
            color: #1e293b;
            display: block;
            margin-top: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
        }

        textarea {
            height: 150px;
            resize: none;
        }

        .send-btn {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .send-btn:hover {
            background: #1e4fcf;
        }

        .info-box {
            margin-top: 40px;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
        }

        .info-box h3 {
            margin: 0 0 10px;
            color: #1e293b;
        }

        .info-box p {
            margin: 5px 0;
            color: #334155;
        }

        .back-btn {
            display: block;
            width: fit-content;
            margin: 35px auto 0;
            padding: 12px 28px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .back-btn:hover {
            background: #1e4fcf;
        }
    </style>
</head>

<body>

    <!-- الهيدر -->
    <header>
        <img src="logo.png" class="logo-img" alt="Logo">
    </header>

    <div class="contact-container">
        <h1>تواصل معنا</h1>

        <form id="contactForm">
            <label>الاسم</label>
            <input type="text" id="name" placeholder="اكتب اسمك هنا">

            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@email.com">

            <label>رسالتك</label>
            <textarea id="message" placeholder="اكتب رسالتك هنا"></textarea>

            <button class="send-btn" id="sendBtn">إرسال</button>
        </form>

        <div class="info-box">
            <h3>معلومات التواصل</h3>
            <p>📍 الموقع: جامعة طيبة - المدينة المنورة</p>
            <p>📧 البريد: mkbtbtafqalmrft@gmail.com</p>
            <p>📞 الهاتف: 0536496315</p>
        </div>

        <a href="index.html" class="back-btn">العودة للصفحة الرئيسية</a>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCyE6UbwF1HYqcLb7vV2p2CnBBVgaWBMlA",
            authDomain: "afqalmrft-e1913.firebaseapp.com",
            projectId: "afqalmrft-e1913",
            storageBucket: "afqalmrft-e1913.firebasestorage.app",
            messagingSenderId: "871199543253",
            appId: "1:871199543253:web:387907520495191e92f75c",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // إرسال الرسالة
        document.getElementById("contactForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const message = document.getElementById("message").value;
            const sendBtn = document.getElementById("sendBtn");

            if (!name || !email || !message) {
                alert("الرجاء تعبئة جميع الحقول");
                return;
            }

            try {
                await db.collection("messages").add({
                    name,
                    email,
                    message,
                    date: new Date()
                });

                sendBtn.textContent = "تم إرسال رسالتك ✔️";
                sendBtn.style.background = "#16a34a";
                sendBtn.disabled = true;

                document.getElementById("name").value = "";
                document.getElementById("email").value = "";
                document.getElementById("message").value = "";

            } catch (error) {
                alert("حدث خطأ، حاول مرة أخرى");
                console.log(error);
            }
        });
    </script>

</body>
</html>
