<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إتمام الطلب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background: #f5f7fa;
    padding: 20px;
}

.checkout-box {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ddd;
}

h2 {
    margin-bottom: 15px;
    color: #1a3c6e;
}

#orderSummary {
    background: #f0f4fa;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    line-height: 1.8;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 15px;
}

button {
    width: 100%;
    padding: 12px;
    background: #1a3c6e;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
}

button:hover {
    background: #16345d;
}

.payment-option {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0;
    font-size: 16px;
    cursor: pointer;
}

.payment-option input {
    width: 18px;
    height: 18px;
    margin: 0;
}
</style>
</head>

<body>

<div class="checkout-box">
    <h2>إتمام الطلب</h2>

    <p id="orderSummary"></p>

    <input type="text" id="name" placeholder="الاسم الكامل">
    <input type="text" id="phone" placeholder="رقم الجوال">
    <textarea id="address" placeholder="العنوان"></textarea>

    <h3>طريقة الدفع</h3>

    <label class="payment-option">
      <input type="radio" name="payment" value="الدفع عند الاستلام" checked>
      الدفع عند الاستلام
    </label>

    <label class="payment-option">
      <input type="radio" name="payment" value="تحويل بنكي">
      تحويل بنكي
    </label>

    <label class="payment-option">
      <input type="radio" name="payment" value="مدى / فيزا">
      مدى / فيزا
    </label>

    <label class="payment-option">
      <input type="radio" name="payment" value="واتساب">
      واتساب
   </label>

    <button id="goHome" style="background:#777; margin-top:15px;">العودة إلى الرئيسية</button>

    <button id="sendOrder">إرسال الطلب</button>

</div>

<!-- Firebase SDK بدون module -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// إعدادات مشروعك
const firebaseConfig = {
  apiKey: "AIzaSyCyE6UbwF1HYqcLb7vV2p2CnBBVgaWBMlA",
  authDomain: "afqalmrft-e1913.firebaseapp.com",
  projectId: "afqalmrft-e1913",
  storageBucket: "afqalmrft-e1913.firebasestorage.app",
  messagingSenderId: "871199543253",
  appId: "1:871199543253:web:387907520495191e92f75c",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// عرض المنتجات
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let summary = "";
let total = 0;

cart.forEach(item => {
    summary += `• ${item.title} — ${item.price} ريال<br>`;
    total += Number(item.price);
});

document.getElementById("orderSummary").innerHTML =
    summary + "<br><strong>الإجمالي: " + total + " ريال</strong>";

// إرسال الطلب
document.getElementById("sendOrder").onclick = async () => {
document.getElementById("goHome").onclick = () => {
    window.location.href = "index.html";
};

    if (cart.length === 0) {
        alert("السلة فارغة");
        return;
    }

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;
    const payment = document.querySelector('input[name="payment"]:checked').value;

    try {
        await db.collection("orders").add({
            name,
            phone,
            address,
            payment,
            items: cart,
            total,
            date: new Date()
        });

        alert("تم إرسال طلبك بنجاح");
        localStorage.removeItem("cart");
        window.location.href = "index.html";

    } catch (error) {
        alert("حدث خطأ، حاول مرة أخرى");
        console.log(error);
    }
};
</script>

</body>
</html>
