<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إتمام الطلب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background: #f5f7fa;
    padding: 20px;
}

.checkout-box {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #1a3c6e;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
    .payment-option {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0;
    direction: rtl;
}
.payment-option input {
    margin: 0;
}

</style>
</head>

<body>

<div class="checkout-box">
    <h2>إتمام الطلب</h2>

    <p id="orderSummary"></p>

    <input type="text" id="name" placeholder="الاسم الكامل">
    <input type="text" id="phone" placeholder="رقم الجوال">
    <textarea id="address" placeholder="العنوان"></textarea>
<h3>طريقة الدفع</h3>

<label class="payment-option">
  <input type="radio" name="payment" value="الدفع عند الاستلام" checked>
  الدفع عند الاستلام
</label>

<label class="payment-option">
  <input type="radio" name="payment" value="تحويل بنكي">
  تحويل بنكي
</label>

<label class="payment-option">
  <input type="radio" name="payment" value="مدى / فيزا">
  مدى / فيزا
</label>


    <button id="sendOrder">إرسال الطلب</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let summary = "";
let total = 0;

cart.forEach(item => {
    summary += `• ${item.title} — ${item.price} ريال<br>`;
    total += Number(item.price);
});

document.getElementById("orderSummary").innerHTML =
    summary + "<br><strong>الإجمالي: " + total + " ريال</strong>";

document.getElementById("sendOrder").addEventListener("click", () => {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;

    let msg = `طلب جديد:%0A%0A`;
    msg += `الاسم: ${name}%0A`;
    msg += `الجوال: ${phone}%0A`;
    msg += `العنوان: ${address}%0A%0A`;
    msg += `المنتجات:%0A`;

    cart.forEach(item => {
        msg += `- ${item.title} (${item.price} ريال)%0A`;
    });

    msg += `%0Aالإجمالي: ${total} ريال`;


 
});
</script>
    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// إعدادات مشروعك
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("sendOrder").addEventListener("click", async () => {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        alert("السلة فارغة");
        return;
    }

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;

    const payment = document.querySelector('input[name="payment"]:checked').value;

    let total = 0;
    cart.forEach(item => total += Number(item.price));

    try {
        await addDoc(collection(db, "orders"), {
            name,
            phone,
            address,
            payment,
            items: cart,
            total,
            date: serverTimestamp()
        });

        alert("تم إرسال طلبك بنجاح");
        localStorage.removeItem("cart");
        window.location.href = "index.html";

    } catch (error) {
        alert("حدث خطأ، حاول مرة أخرى");
        console.log(error);
    }
});
</script>

</body>
</html>
