<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقييم العملاء</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background: #f5f7fa;
    padding: 20px;
}

.review-box {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ddd;
}

h2 {
    text-align: center;
    color: #1a3c6e;
    margin-bottom: 20px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 15px;
}

button {
    width: 100%;
    padding: 12px;
    background: #1a3c6e;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
}

button:hover {
    background: #16345d;
}

.stars {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 15px 0;
}

.star {
    font-size: 30px;
    cursor: pointer;
    color: #ccc;
}

.star.active {
    color: gold;
}
</style>
</head>

<body>

<div class="review-box">
    <h2>أضف تقييمك</h2>

    <input type="text" id="reviewName" placeholder="اسمك">
    <textarea id="reviewText" placeholder="اكتب رأيك هنا..."></textarea>

    <div class="stars">
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
    </div>

    <button id="sendReview">إرسال التقييم</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// إعدادات Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCyE6UbwF1HYqcLb7vV2p2CnBBVgaWBMlA",
  authDomain: "afqalmrft-e1913.firebaseapp.com",
  projectId: "afqalmrft-e1913",
  storageBucket: "afqalmrft-e1913.firebasestorage.app",
  messagingSenderId: "871199543253",
  appId: "1:871199543253:web:387907520495191e92f75c",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ⭐ نظام النجوم
let selectedStars = 0;

document.querySelectorAll(".star").forEach(star => {
    star.addEventListener("click", () => {
        selectedStars = star.dataset.value;

        document.querySelectorAll(".star").forEach(s => s.classList.remove("active"));
        for (let i = 0; i < selectedStars; i++) {
            document.querySelectorAll(".star")[i].classList.add("active");
        }
    });
});

// ⭐ إرسال التقييم
document.getElementById("sendReview").onclick = async () => {
    const name = document.getElementById("reviewName").value;
    const text = document.getElementById("reviewText").value;

    if (!name || !text || selectedStars === 0) {
        alert("الرجاء تعبئة جميع الحقول واختيار عدد النجوم");
        return;
    }

    try {
        await db.collection("reviews").add({
            name,
            text,
            stars: selectedStars,
            date: new Date()
        });

        alert("تم إرسال تقييمك بنجاح");
        document.getElementById("reviewName").value = "";
        document.getElementById("reviewText").value = "";
        selectedStars = 0;
        document.querySelectorAll(".star").forEach(s => s.classList.remove("active"));

    } catch (error) {
        alert("حدث خطأ، حاول مرة أخرى");
        console.log(error);
    }
};
</script>

</body>
</html>
