<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سلة المشتريات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">


<style>
    body {
        font-family: 'Tajawal', sans-serif;
        background: #f5f7fa;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 80%;
        margin: 40px auto;
    }

    h1 {
        text-align: center;
        color: #1a3c6e;
        margin-bottom: 30px;
    }

    .cart-item {
        background: #fff;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 20px;
        border: 1px solid #dce3ec;
    }

    .cart-item img {
        width: 90px;
        border-radius: 6px;
    }

    .cart-item h3 {
        margin: 0;
        color: #1a3c6e;
    }

    .cart-item p {
        margin: 5px 0;
        color: #444;
    }

    .remove-btn {
        margin-right: auto;
        background: #d9534f;
        color: #fff;
        border: none;
        padding: 8px 15px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }

    .remove-btn:hover {
        background: #c9302c;
    }

    .checkout-btn {
        display: block;
        width: 200px;
        margin: 30px auto;
        background: #1a3c6e;
        color: #fff;
        text-align: center;
        padding: 12px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 16px;
    }

    .checkout-btn:hover {
        background: #16345d;
    }

    .empty {
        text-align: center;
        color: #777;
        font-size: 18px;
        margin-top: 50px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>سلة المشتريات</h1>
    <div id="cart-items"></div>
<h2 id="totalPrice" style="text-align:center; color:#1a3c6e; margin-top:20px;"></h2>
    <a href="index.html" class="checkout-btn">متابعة التسوق</a>
<a href="checkout.html" class="checkout-btn" style="background:#28a745;">إتمام الطلب</a>


</div>

<script>
    const cartContainer = document.getElementById("cart-items");
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    if (cart.length === 0) {
        cartContainer.innerHTML = "<p class='empty'>السلة فارغة</p>";
    } else {
        cart.forEach((item, index) => {
            cartContainer.innerHTML += `
                <div class="cart-item">
                    <img src="${item.img}">
                    <div>
                        <h3>${item.title}</h3>
                        <p>${item.price} ريال</p>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})">حذف</button>
                </div>
            `;
        });
    }

    function removeItem(i) {
        cart.splice(i, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        location.reload();
  }
    function updateTotal() {
    let total = 0;
    cart.forEach(item => {
        total += Number(item.price);
    });
    document.getElementById("totalPrice").textContent = "الإجمالي: " + total + " ريال";
}

updateTotal();

</script>

</body>
</html>
