<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - أفق المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #0f172a;
            --mid-blue: #1e3a8a;
            --accent-blue: #2563eb;
            --light-bg: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--light-bg); color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }

        /* --- Header / Banner (Matching Main Page) --- */
        .header-banner { 
            background: linear-gradient(135deg, #020617 0%, #1e3a8a 100%); 
            color: white; 
            padding: 20px 8%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-right { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 60px; width: auto; }
        .logo-text { font-weight: bold; line-height: 1.2; text-align: right; }
        .logo-text span { font-size: 1.2rem; display: block; }
        .logo-text small { color: #cbd5e1; font-size: 0.8rem; }

        .back-link {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-link:hover { color: white; }

        /* --- Login Section --- */
        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 30px;
            color: var(--dark-blue);
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #475569;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #1d4ed8, #3b82f6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .footer-note a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header class="header-banner">
        <a href="index.html" class="back-link">← العودة للرئيسية</a>
        
        <div class="nav-right">
            <div class="logo-text">
                <span>أفق المعرفة</span>
                <small>جامعة طيبة</small>
            </div>
            <img src="logo.png" alt="Logo" class="logo-img">
        </div>
    </header>

    <main class="login-container">
        <div class="login-card">
            <h2>تسجيل الدخول</h2>
            
            <form action="#">
                <div class="form-group">
                    <label for="username">رقم الهاتف / البريد الإلكتروني</label>
                    <input type="text" id="username" placeholder="أدخل بياناتك هنا" required>
                </div>

                <div class="form-group">
                    <label for="password">رمز الدخول</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">تسجيل الدخول</button>
            </form>

            <div class="footer-note">
                ليس لديك حساب؟ <a href="#">إنشاء حساب جديد</a>
            </div>
        </div>
    </main>

    <footer style="text-align: center; padding: 20px; color: #94a3b8; font-size: 0.8rem;">
        &copy; 2026 أفق المعرفة. قسم علم المعلومات - جامعة طيبة جميع الحقوق محفوظة.
    </footer>

</body>
</html>
