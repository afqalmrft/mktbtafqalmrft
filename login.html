<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - أفق المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: white;
            padding: 35px;
            border-radius: 25px;
            width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .logo {
            width: 90px;
            margin-bottom: 15px;
        }

        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab {
            width: 50%;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #64748b;
        }

        .active-tab {
            color: #2563eb;
            border-bottom: 3px solid #2563eb;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1e4fcf;
            transform: translateY(-2px);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="auth-card">

        <img src="logo.png" class="logo" alt="شعار أفق المعرفة">

        <div class="tabs">
            <div id="loginTab" class="tab active-tab">تسجيل دخول</div>
            <div id="registerTab" class="tab">إنشاء حساب</div>
        </div>

        <!-- تسجيل الدخول -->
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="البريد الجامعي" required>
            <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
            <button type="submit" class="btn">تسجيل الدخول</button>
        </form>

        <!-- إنشاء حساب -->
        <form id="registerForm" class="hidden">
            <input type="text" id="regName" placeholder="اسم المستخدم" required>
            <input type="email" id="regEmail" placeholder="البريد الجامعي" required>
            <input type="password" id="regPassword" placeholder="كلمة المرور (6 خانات على الأقل)" required minlength="6">
            <button type="submit" class="btn">إنشاء الحساب</button>
        </form>

    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword 
        import { updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyE6UbwF1HYqcLb7vV2p2CnBBVgaWBMlA",
            authDomain: "afqalmrft-e1913.firebaseapp.com",
            projectId: "afqalmrft-e1913",
            storageBucket: "afqalmrft-e1913.firebasestorage.app",
            messagingSenderId: "871199543253",
            appId: "1:871199543253:web:387907520495191e92f75c",
            measurementId: "G-8EQD69ZCKY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // التبويبات
        const loginTab = document.getElementById("loginTab");
        const registerTab = document.getElementById("registerTab");
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");

        loginTab.onclick = () => {
            loginTab.classList.add("active-tab");
            registerTab.classList.remove("active-tab");
            loginForm.classList.remove("hidden");
            registerForm.classList.add("hidden");
        };

        registerTab.onclick = () => {
            registerTab.classList.add("active-tab");
            loginTab.classList.remove("active-tab");
            registerForm.classList.remove("hidden");
            loginForm.classList.add("hidden");
        };

        // تسجيل الدخول
        loginForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const email = loginEmail.value;
            const password = loginPassword.value;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    window.location.href = "index.html";
                })
                .catch(err => alert("خطأ: " + err.message));
        });

        // إنشاء حساب
      registerForm.addEventListener("submit", (e) => {
  e.preventDefault();

  const username = regName.value;   // ← اسم المستخدم
  const email = regEmail.value;
  const password = regPassword.value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(async (userCredential) => {
      const user = userCredential.user;

      // ⭐ هنا بالضبط ينحط كود حفظ الاسم
      await updateProfile(user, {
        displayName: username
      });

      alert("تم إنشاء الحساب بنجاح!");
      window.location.href = "index.html";
    })
    .catch((error) => {
      alert("خطأ: " + error.message);
    });
});

    </script>

</body>
</html>
