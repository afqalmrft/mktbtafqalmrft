<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - أفق المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .login-card { background: white; padding: 40px; border-radius: 25px; width: 380px; text-align: center; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2 { color: #0f172a; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-family: inherit; font-size: 0.95rem; }
        .btn { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; margin-top: 15px; }
        .btn:hover { background: #1e40af; transform: translateY(-2px); }
        .links { margin-top: 20px; font-size: 0.9rem; }
        a { color: #2563eb; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>تسجيل الدخول</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="البريد الإلكتروني الجامعي" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn">دخول</button>
        </form>
        <div class="links">
            <p>لا تملك حساباً؟ <a href="register.html">سجل الآن</a></p>
            <p><a href="index.html" style="color: #64748b;">العودة للرئيسية</a></p>
        </div>
    </div>

    <script>
        const API_KEY = "BAcyVPvOwYbbitEjdJSZ0G7LDBy-p5BYaBB_YkoN0IkNbippVXmqd60yGY4nwgO3sPF7tPk6gi6VttIiM41PZfo";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${API_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ email, password, returnSecureToken: true }),
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('currentUser', JSON.stringify({
                        email: data.email,
                        idToken: data.idToken,
                        localId: data.localId
                    }));
                    window.location.href = 'index.html';
                } else {
                    alert("خطأ: " + (data.error.message === "EMAIL_NOT_FOUND" ? "البريد غير مسجل" : "كلمة المرور خاطئة"));
                }
            } catch (err) {
                alert("فشل الاتصال بالسحابة. تأكد من الإنترنت.");
            }
        });
    </script>
</body>
</html>
