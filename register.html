<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب - أفق المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-card { background: white; padding: 40px; border-radius: 25px; width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2 { color: #0f172a; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-family: inherit; }
        .btn { width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn:hover { background: #059669; transform: translateY(-2px); }
        a { color: #2563eb; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>إنشاء حساب سحابي</h2>
        <form id="regForm">
            <input type="text" id="username" placeholder="اسم المستخدم" required>
            <input type="email" id="email" placeholder="البريد الجامعي" required>
            <input type="password" id="password" placeholder="كلمة المرور (6 خانات على الأقل)" required minlength="6">
            <button type="submit" class="btn">إنشاء الحساب</button>
        </form>
        <p style="margin-top:20px;">لديك حساب؟ <a href="login.html">سجل دخولك</a></p>
    </div>

    <script>
        const API_KEY = "AIzaSyDWIr2GNP5OSu32nUZqgXuNnWUn-IZ1EBg";

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;

            try {
                const response = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${API_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ email, password, returnSecureToken: true }),
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (response.ok) {
                    alert("مبروك! تم إنشاء حسابك سحابياً");
                    localStorage.setItem('currentUser', JSON.stringify({ email, username }));
                    window.location.href = 'index.html';
                } else {
                    alert("فشل التسجيل: " + data.error.message);
                }
            } catch (err) {
                alert("حدث خطأ في الاتصال بالسيرفر");
            }
        });
    </script>
</body>
</html>
