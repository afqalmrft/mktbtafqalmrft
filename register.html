<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - أفق المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .auth-container h2 { color: #0f172a; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; margin-bottom: 5px; color: #475569; font-size: 0.95rem; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-family: inherit; font-size: 1rem; outline: none; }
        .form-group input:focus { border-color: #2563eb; }
        .btn-auth { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; font-family: inherit; }
        .btn-auth:hover { background-color: #1d4ed8; }
        .switch-link { margin-top: 15px; display: block; color: #64748b; font-size: 0.9rem; text-decoration: none; }
        .switch-link span { color: #2563eb; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>إنشاء حساب جديد</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="regUsername">اسم المستخدم</label>
                <input type="text" id="regUsername" required>
            </div>
            <div class="form-group">
                <label for="regEmail">البريد الإلكتروني الجامعي</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label for="regPassword">كلمة المرور</label>
                <input type="password" id="regPassword" required>
            </div>
            <button type="submit" class="btn-auth">تسجيل</button>
        </form>
        <a href="login.html" class="switch-link">لديك حساب بالفعل؟ <span>سجل دخولك هنا</span></a>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page refresh
            
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            // Get existing users or create an empty array
            let users = JSON.parse(localStorage.getItem('libraryUsers')) || [];

            // Check if email already exists
            if(users.some(user => user.email === email)) {
                alert('هذا البريد الإلكتروني مسجل بالفعل!');
                return;
            }

            // Save new user
            users.push({ username, email, password });
            localStorage.setItem('libraryUsers', JSON.stringify(users));

            alert('تم إنشاء الحساب بنجاح! سيتم تحويلك لصفحة تسجيل الدخول.');
            window.location.href = 'login.html'; // Redirect to login
        });
    </script>
</body>
</html>
