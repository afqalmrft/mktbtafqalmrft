<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تصفح الكتب</title>
    <style>
        body {
            font-family: "Tajawal", sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .books-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .book-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.3s;
        }

        .book-card:hover {
            transform: translateY(-5px);
        }

        .book-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
        }

        .book-title {
            font-size: 18px;
            margin: 15px 0 10px;
            font-weight: bold;
        }

        .book-btn {
            display: inline-block;
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .book-btn:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

<h1>تصفح الكتب</h1>

<div class="books-container">

    <div class="book-card">
        <img src="book1.png" alt="كتاب 1">
        <div class="book-title">عنوان الكتاب الأول</div>
        <a href="#" class="book-btn">قراءة / تحميل</a>
    </div>

    <div class="book-card">
        <img src="book2.png" alt="كتاب 2">
        <div class="book-title">عنوان الكتاب الثاني</div>
        <a href="#" class="book-btn">قراءة / تحميل</a>
    </div>

    <div class="book-card">
        <img src="book3.png" alt="كتاب 3">
        <div class="book-title">عنوان الكتاب الثالث</div>
        <a href="#" class="book-btn">قراءة / تحميل</a>
    </div>

</div>

</body>
</html>
