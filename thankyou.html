<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تم استلام طلبك</title>
<style>
    body {
        font-family: "Tajawal", sans-serif;
        background: #f7f7f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .box {
        background: #fff;
        padding: 35px;
        border-radius: 12px;
        text-align: center;
        width: 350px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    h2 {
        margin-bottom: 10px;
        color: #333;
    }

    p {
        color: #555;
        margin-bottom: 15px;
        font-size: 15px;
    }

    .order-id {
        background: #fafafa;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #eee;
        margin-bottom: 20px;
        font-weight: bold;
        font-size: 14px;
        color: #333;
    }

    a {
        display: inline-block;
        padding: 12px 20px;
        background: #222;
        color: #fff;
        border-radius: 8px;
        text-decoration: none;
        transition: 0.2s;
    }

    a:hover {
        background: #444;
    }
</style>
</head>

<body>

<div class="box">
    <h2>شكرًا لك</h2>
    <p>تم استلام طلبك بنجاح.</p>

    <div id="orderNumber" class="order-id"></div>

    <a href="index.html">العودة للصفحة الرئيسية</a>
</div>

<script>
    const orderId = localStorage.getItem("orderId");

    if (orderId) {
        document.getElementById("orderNumber").textContent =
            "رقم طلبك: " + orderId;
    }

    // حذف رقم الطلب بعد عرضه
    localStorage.removeItem("orderId");
</script>

</body>
</html>
