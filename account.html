<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حسابي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background: #f1f5f9;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 450px;
    margin: 80px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.15);
    text-align: center;
}

h2 {
    color: #1e3a8a;
    margin-bottom: 20px;
}

.info {
    text-align: right;
    margin: 20px 0;
    line-height: 2;
    font-size: 18px;
}

button {
    width: 100%;
    padding: 12px;
    background: #1e3a8a;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 17px;
    margin-top: 15px;
}

button:hover {
    background: #162f6b;
}

.back-btn {
    display: block;
    margin-top: 20px;
    text-decoration: none;
    color: #1e3a8a;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>حسابي</h2>

    <div class="info">
        <p><strong>الاسم:</strong> <span id="userName">...</span></p>
        <p><strong>البريد:</strong> <span id="userEmail">...</span></p>
    </div>

    <button id="logoutBtn">تسجيل الخروج</button>

    <a href="index.html" class="back-btn">العودة للرئيسية</a>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
// إعدادات Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCyE6UbwF1HYqcLb7vV2p2CnBBVgaWBMlA",
  authDomain: "afqalmrft-e1913.firebaseapp.com",
  projectId: "afqalmrft-e1913",
  storageBucket: "afqalmrft-e1913.firebasestorage.app",
  messagingSenderId: "871199543253",
  appId: "1:871199543253:web:387907520495191e92f75c",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// جلب بيانات المستخدم
auth.onAuthStateChanged(user => {
    if (!user) {
        window.location.href = "login.html"; // لو مو مسجل دخول يرجع لصفحة الدخول
        return;
    }

    document.getElementById("userName").textContent = user.displayName || "بدون اسم";
    document.getElementById("userEmail").textContent = user.email;
});

// تسجيل الخروج
document.getElementById("logoutBtn").onclick = () => {
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
};
</script>

</body>
</html>
