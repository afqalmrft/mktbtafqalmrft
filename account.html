<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حسابي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 90%;
    max-width: 750px;
    background: white;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(0,0,0,0.25);
}

h2 {
    text-align: center;
    color: #1e3a8a;
    margin-bottom: 25px;
}

/* التبويبات */
.tabs {
    display: flex;
    justify-content: center;
    margin-bottom: 25px;
}

.tab {
    padding: 12px 25px;
    cursor: pointer;
    background: #e2e8f0;
    margin: 0 5px;
    border-radius: 10px;
    font-weight: bold;
    color: #1e3a8a;
    transition: 0.2s;
}

.tab:hover {
    background: #cbd5e1;
}

.tab.active {
    background: #1e3a8a;
    color: white;
}

.section {
    display: none;
}

.section.active {
    display: block;
}

/* بيانات العميل */
.info p {
    margin: 10px 0;
    font-size: 18px;
}

/* الطلبات */
.order {
    background: #f8fafc;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    border-right: 5px solid #2563eb;
}

.order p {
    margin: 5px 0;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    background: #1e3a8a;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 17px;
    margin-top: 20px;
}

button:hover {
    background: #162f6b;
}
</style>
</head>

<body>

<div class="container">
    <h2>حسابي</h2>

    <!-- التبويبات -->
    <div class="tabs">
        <div class="tab active" data-tab="info">الملف الشخصي</div>
        <div class="tab" data-tab="orders">طلباتي</div>
    </div>

    <!-- قسم بياناتي -->
    <div id="info" class="section active">
        <div class="info">
            <p><strong>الاسم:</strong> <span id="userName">...</span></p>
            <p><strong>البريد:</strong> <span id="userEmail">...</span></p>
        </div>

        <button id="logoutBtn">تسجيل الخروج</button>
    </div>

    <!-- قسم طلباتي -->
    <div id="orders" class="section">
        <div id="ordersList">
            <p style="text-align:center; color:#64748b;">جاري تحميل الطلبات...</p>
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// إعدادات Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCyE6UbwF1HYqcLb7vV2p2CnBBVgaWBMlA",
  authDomain: "afqalmrft-e1913.firebaseapp.com",
  projectId: "afqalmrft-e1913",
  storageBucket: "afqalmrft-e1913.firebasestorage.app",
  messagingSenderId: "871199543253",
  appId: "1:871199543253:web:387907520495191e92f75c",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// التبويبات
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));

        tab.classList.add("active");
        document.getElementById(tab.dataset.tab).classList.add("active");
    });
});

// تحميل بيانات المستخدم
auth.onAuthStateChanged(async user => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    document.getElementById("userName").textContent = user.displayName || "بدون اسم";
    document.getElementById("userEmail").textContent = user.email;

    // تحميل الطلبات
    const snapshot = await db.collection("orders")
        .where("email", "==", user.email)
        .orderBy("date", "desc")
        .get();

    const ordersList = document.getElementById("ordersList");

    if (snapshot.empty) {
        ordersList.innerHTML = "<p style='text-align:center; color:#64748b;'>لا توجد طلبات حتى الآن</p>";
        return;
    }

    ordersList.innerHTML = "";

    snapshot.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "order";

        div.innerHTML = `
            <p><strong>رقم الطلب:</strong> ${data.orderId}</p>
            <p><strong>المنتج:</strong> ${data.productName}</p>
            <p><strong>السعر:</strong> ${data.price} ريال</p>
            <p><strong>التاريخ:</strong> ${new Date(data.date.seconds * 1000).toLocaleString()}</p>
            <p><strong>الحالة:</strong> ${data.status || "قيد المراجعة"}</p>
        `;

        ordersList.appendChild(div);
    });
});

// تسجيل الخروج
document.getElementById("logoutBtn").onclick = () => {
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
};
</script>

</body>
</html>
